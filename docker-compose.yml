services:
    # ── PHP-FPM application ──────────────────────────────────────────────────────
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        env_file: .env
        volumes:
            - storage:/var/www/html/storage
            - public:/var/www/html/public-vol # shared with nginx
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    # ── Nginx web server ─────────────────────────────────────────────────────────
    nginx:
        image: docker.io/library/nginx:1.27-alpine
        restart: unless-stopped
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
            - public:/var/www/html/public:ro # static assets populated by app
            - storage:/var/www/html/storage:ro # allows nginx to serve storage files
        depends_on:
            app:
                condition: service_healthy

    # ── Queue worker ─────────────────────────────────────────────────────────────
    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        env_file: .env
        volumes:
            - storage:/var/www/html/storage
        command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--memory=128"]
        depends_on:
            app:
                condition: service_healthy

    # ── Task scheduler ───────────────────────────────────────────────────────────
    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        env_file: .env
        volumes:
            - storage:/var/www/html/storage
        command: ["php", "artisan", "schedule:work"]
        depends_on:
            app:
                condition: service_healthy

    # ── MariaDB ──────────────────────────────────────────────────────────────────
    db:
        image: docker.io/library/mariadb:11
        restart: unless-stopped
        environment:
            MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MARIADB_DATABASE: ${DB_DATABASE}
            MARIADB_USER: ${DB_USERNAME}
            MARIADB_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db:/var/lib/mysql
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    # ── Redis ────────────────────────────────────────────────────────────────────
    redis:
        image: docker.io/library/redis:7-alpine
        restart: unless-stopped
        volumes:
            - redis:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5

volumes:
    db:
    redis:
    storage:
    public:
