name: Tests

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  version-alignment:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify app.php version matches Git tag
        run: |
          set -euo pipefail
          if ! grep -Eq '^\$appVersion = "[^"]+";' config/app.php; then
            echo 'Hardcoded $appVersion not found in config/app.php'
            exit 1
          fi

          app_ver="$(grep -E '^\$appVersion = "[^"]+";' config/app.php | head -n1 | sed -E 's/^\$appVersion = "([^"]+)";/\1/')"
          tag_ver="${GITHUB_REF_NAME}"
          app_norm="${app_ver#v}"
          tag_norm="${tag_ver#v}"

          echo "APP_VERSION=${app_ver}"
          echo "TAG=${tag_ver}"

          if [ "${app_norm}" != "${tag_norm}" ]; then
            echo "Version mismatch: app.php (${app_ver}) != tag (${tag_ver})"
            exit 1
          fi

  pest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Copy environment
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test
